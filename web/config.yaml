# --- Colors ---
colors:
  primary: "0558AE"          # pblue  RGB(5,80,174)
  primary_dark: "0A3069"     # pdarkblue RGB(10,48,105)
  accent: "CF222E"           # pred  RGB(207,34,46)
  grey: "59636E"             # pgrey RGB(89,99,110)
  violet: "6639BA"           # pviolet RGB(102,57,186)
  green: "008000"            # pgreen RGB(0,128,0)

# --- Logo ---
logo:
  # Relative to web/docs/
  path: "img/logoURJC.svg"
  alt: "Logo Universidad Rey Juan Carlos"

# --- Font ---
font:
  text: "Roboto"
  code: "Roboto Mono"

# --- Material theme navigation features ---
features:
  - navigation.tabs          # top tabs per chapter
  - navigation.sections      # expandable sections in the sidebar
  - navigation.top           # "back to top" button
  - navigation.indexes       # index page per section
  - toc.integrate            # TOC integrated in the sidebar
  - search.highlight         # highlight searched terms
  - search.suggest           # search suggestions
  - content.code.copy        # copy button on code blocks
  - content.code.annotate    # code annotations

# --- Language ---
language: "es"

# --- Social icons / extra links (optional) ---
social: []
# Example:
# social:
#   - icon: fontawesome/brands/github
#     link: https://github.com/tu-usuario/tu-repo
